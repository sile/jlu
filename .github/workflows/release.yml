name: Release

on:
  push:
    tags:
      - '*'

jobs:
  github-release-draft:
    name: 'Create GitHub Release Draft'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT

      - name: Create Release Draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.get_version.outputs.VERSION }} \
            --repo ${{ github.repository }} \
            --title "v${{ steps.get_version.outputs.VERSION }}" \
            --generate-notes \
            --draft

  linux-binary:
    name: 'Upload Binary for Linux'
    runs-on: ubuntu-latest
    needs: github-release-draft
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependent packages
        run: sudo apt install -y musl-tools

      - run: rustup update stable
      - run: rustup default stable
      - run: rustup target add x86_64-unknown-linux-musl
      - name: Run cargo build
        run: cargo build --release --target=x86_64-unknown-linux-musl
      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mv target/x86_64-unknown-linux-musl/release/jlu jlu-${{ needs.github-release-draft.outputs.version }}.x86_64-unknown-linux-musl
          gh release upload ${{ needs.github-release-draft.outputs.version }} \
            --repo ${{ github.repository }} \
            jlu-${{ needs.github-release-draft.outputs.version }}.x86_64-unknown-linux-musl

  macos-binary:
    name: 'Upload Binary for MacOS'
    runs-on: macos-latest
    needs: github-release-draft
    strategy:
      matrix:
        target: ["x86_64-apple-darwin", "aarch64-apple-darwin"]
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - run: rustup update stable
      - run: rustup default stable
      - run: rustup target add ${{ matrix.target }}
      - name: Run cargo build
        run: cargo build --release --target=${{ matrix.target }}
      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mv target/${{ matrix.target }}/release/jlu jlu-${{ needs.github-release-draft.outputs.version }}.${{ matrix.target }}
          gh release upload ${{ needs.github-release-draft.outputs.version }} \
            --repo ${{ github.repository }} \
            jlu-${{ needs.github-release-draft.outputs.version }}.${{ matrix.target }}
